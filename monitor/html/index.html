<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SRT Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e2e8f0; font-family: Inter, system-ui, sans-serif; padding: 20px; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid #1e2433; padding-bottom: 16px; }
  header h1 { font-size: 1.2rem; font-weight: 600; color: #fff; }
  #status { margin-left: auto; font-size: .75rem; color: #64748b; }
  #no-streams { text-align: center; color: #475569; margin-top: 80px; font-size: 1rem; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 20px; }
  .card { background: #161b2e; border: 1px solid #1e2a45; border-radius: 10px; overflow: hidden; transition: opacity .3s; }
  .card.fade-in { animation: fadeIn .4s ease; }
  .card.fade-out { opacity: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .video-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
  video { width: 100%; height: 100%; display: block; }
  .badge-live { position: absolute; top: 10px; left: 10px; background: #ef4444; color: #fff; font-size: .65rem; font-weight: 700; letter-spacing: .08em; padding: 2px 7px; border-radius: 4px; }
  .badge-preview { position: absolute; top: 10px; left: 56px; background: #334155; color: #94a3b8; font-size: .65rem; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
  .btn-audio { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.2); border-radius: 6px; color: #fff; font-size: 1.1rem; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .15s; user-select: none; }
  .btn-audio:hover { background: rgba(0,0,0,.85); }
  .btn-audio.active { background: #2563eb; border-color: #3b82f6; }
  .btn-hd { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.2); border-radius: 6px; color: #94a3b8; font-size: .7rem; font-weight: 700; letter-spacing: .06em; padding: 0 10px; height: 34px; display: flex; align-items: center; gap: 5px; cursor: pointer; transition: background .15s, color .15s, border-color .15s; user-select: none; }
  .btn-hd:hover { background: rgba(37,99,235,.7); border-color: #3b82f6; color: #fff; }
  .btn-m3u8 { position: absolute; bottom: 10px; left: 80px; background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.2); border-radius: 6px; color: #94a3b8; font-size: .7rem; font-weight: 700; letter-spacing: .06em; padding: 0 10px; height: 34px; display: flex; align-items: center; gap: 5px; cursor: pointer; transition: background .15s, color .15s, border-color .15s; user-select: none; }
  .btn-m3u8:hover { background: rgba(15,118,110,.7); border-color: #14b8a6; color: #fff; }
  .btn-m3u8.copied { background: #0f766e; border-color: #14b8a6; color: #fff; }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #1e2433; border-top: 1px solid #1e2433; }
  .metric { background: #161b2e; padding: 10px 14px; display: flex; flex-direction: column; gap: 3px; }
  .metric-label { font-size: .65rem; color: #64748b; text-transform: uppercase; letter-spacing: .06em; }
  .metric-value { font-size: 1.05rem; font-weight: 600; color: #e2e8f0; }
  .metric-value.green  { color: #22c55e; }
  .metric-value.yellow { color: #eab308; }
  .metric-value.red    { color: #ef4444; }
  .stream-name { padding: 10px 14px 0; font-size: .8rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .08em; }
  /* Modal */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; gap: 14px; padding: 24px; }
  #modal-overlay.open { display: flex; }
  #modal-box { background: #0f1117; border: 1px solid #1e2a45; border-radius: 12px; overflow: hidden; width: 100%; max-width: 1280px; }
  #modal-header { display: flex; align-items: center; padding: 12px 16px; gap: 10px; border-bottom: 1px solid #1e2433; }
  #modal-title { font-size: .85rem; font-weight: 600; color: #e2e8f0; text-transform: uppercase; letter-spacing: .08em; flex: 1; }
  .badge-hd { background: #1d4ed8; color: #bfdbfe; font-size: .65rem; font-weight: 700; letter-spacing: .08em; padding: 2px 7px; border-radius: 4px; }
  #modal-btn-audio { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15); border-radius: 6px; color: #e2e8f0; font-size: 1.1rem; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .15s; }
  #modal-btn-audio.active { background: #2563eb; border-color: #3b82f6; }
  #modal-close { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15); border-radius: 6px; color: #94a3b8; font-size: 1.2rem; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .15s, color .15s; }
  #modal-close:hover { background: #ef4444; color: #fff; border-color: #ef4444; }
  #modal-video-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
  #modal-video { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<header>
  <h1>SRT Monitor</h1>
  <span id="status">conectando...</span>
</header>

<div id="no-streams" style="display:none">Sin streams activos</div>
<div id="grid"></div>

<!-- Modal full quality -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-header">
      <span id="modal-title">&mdash;</span>
      <span class="badge-hd">FULL HD</span>
      <button id="modal-btn-audio" title="Audio">&#128263;</button>
      <button id="modal-close" title="Cerrar">&#x2715;</button>
    </div>
    <div id="modal-video-wrap">
      <video id="modal-video" autoplay muted playsinline></video>
    </div>
  </div>
</div>

<script>
// PREVIEW_MODE: 'transcode' usa /hls-preview (requiere servicio transcoder con ffmpeg).
// En producción con recursos suficientes cambiar a 'transcode'.
// 'passthrough' sirve el HLS original directamente — sin transcode, sin overhead de CPU.
const PREVIEW_MODE = 'passthrough';
const PREV = PREVIEW_MODE === 'transcode' ? '/hls-preview' : '/hls-full';
const FULL = '/hls-full';
const API  = '/api/mediamtx';
const POLL = 2000;

const cards  = {};
const grid   = document.getElementById('grid');
const noStr  = document.getElementById('no-streams');
const status = document.getElementById('status');

const overlay = document.getElementById('modal-overlay');
const mTitle  = document.getElementById('modal-title');
const mVideo  = document.getElementById('modal-video');
const mAudio  = document.getElementById('modal-btn-audio');
const mClose  = document.getElementById('modal-close');
let mHls = null;

function openModal(path) {
  mTitle.textContent = path;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  const src = FULL + '/' + path + '/index.m3u8';
  mVideo.muted = true;
  mAudio.classList.remove('active');
  mAudio.textContent = '\uD83D\uDD07';
  if (Hls.isSupported()) {
    mHls = new Hls({ lowLatencyMode: true, liveSyncDurationCount: 2 });
    mHls.loadSource(src);
    mHls.attachMedia(mVideo);
  } else if (mVideo.canPlayType('application/vnd.apple.mpegurl')) {
    mVideo.src = src;
  }
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  if (mHls) { mHls.destroy(); mHls = null; }
  mVideo.src = '';
  mVideo.muted = true;
}

mClose.addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
mAudio.addEventListener('click', () => {
  mVideo.muted = !mVideo.muted;
  mAudio.classList.toggle('active', !mVideo.muted);
  mAudio.textContent = mVideo.muted ? '\uD83D\uDD07' : '\uD83D\uDD0A';
});

function colorRTT(v)  { return v < 50 ? 'green' : v < 150 ? 'yellow' : 'red'; }
function colorDrop(v) { return v === 0 ? 'green' : v < 100 ? 'yellow' : 'red'; }

function muteAll() {
  for (const path of Object.keys(cards)) {
    const v = cards[path].el.querySelector('video');
    const b = cards[path].el.querySelector('.btn-audio');
    if (v) v.muted = true;
    if (b) { b.classList.remove('active'); b.textContent = '\uD83D\uDD07'; }
  }
}

function createCard(path) {
  const el  = document.createElement('div');
  el.className = 'card fade-in';
  const sid = path.replace(/[^a-zA-Z0-9_-]/g, '_');
  el.innerHTML =
    '<div class="stream-name">' + path + '</div>' +
    '<div class="video-wrap">' +
      '<video autoplay muted playsinline></video>' +
      '<span class="badge-live">LIVE</span>' +
      '<span class="badge-preview">480p</span>' +
      '<button class="btn-hd">&#9654; HD</button>' +
      '<button class="btn-m3u8" title="Copiar link m3u8">&#128279; m3u8</button>' +
      '<button class="btn-audio">&#128263;</button>' +
    '</div>' +
    '<div class="metrics">' +
      '<div class="metric"><span class="metric-label">Bitrate</span><span class="metric-value" id="m-b-' + sid + '">&mdash;</span></div>' +
      '<div class="metric"><span class="metric-label">RTT</span><span class="metric-value" id="m-r-' + sid + '">&mdash;</span></div>' +
      '<div class="metric"><span class="metric-label">Drops</span><span class="metric-value" id="m-d-' + sid + '">&mdash;</span></div>' +
      '<div class="metric"><span class="metric-label">Loss</span><span class="metric-value" id="m-l-' + sid + '">&mdash;</span></div>' +
    '</div>';
  grid.appendChild(el);

  const vid = el.querySelector('video');
  const bAu = el.querySelector('.btn-audio');
  const bHD = el.querySelector('.btn-hd');
  const src = PREV + '/' + path + '/index.m3u8';

  bAu.addEventListener('click', () => {
    if (vid.muted) {
      muteAll(); vid.muted = false; bAu.classList.add('active'); bAu.textContent = '\uD83D\uDD0A';
    } else {
      vid.muted = true; bAu.classList.remove('active'); bAu.textContent = '\uD83D\uDD07';
    }
  });
  bHD.addEventListener('click', () => openModal(path));

  const bM3 = el.querySelector('.btn-m3u8');
  const m3u8url = location.origin + '/hls-full/' + path + '/index.m3u8';
  bM3.addEventListener('click', () => {
    const copied = () => {
      bM3.classList.add('copied');
      bM3.textContent = '\u2713 copiado';
      setTimeout(() => { bM3.classList.remove('copied'); bM3.innerHTML = '&#128279; m3u8'; }, 2000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(m3u8url).then(copied).catch(() => fallbackCopy(m3u8url, copied));
    } else {
      fallbackCopy(m3u8url, copied);
    }
  });

  if (Hls.isSupported()) {
    const h = new Hls({ lowLatencyMode: true, liveSyncDurationCount: 2 });
    h.loadSource(src);
    h.attachMedia(vid);
    cards[path].hls = h;
  } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    vid.src = src;
  }
  return el;
}

function removeCard(path) {
  const c = cards[path];
  if (!c) return;
  if (c.hls) c.hls.destroy();
  c.el.classList.add('fade-out');
  setTimeout(() => { c.el.remove(); delete cards[path]; }, 350);
}

function updateMetrics(path, d) {
  if (!d) return;
  const sid = path.replace(/[^a-zA-Z0-9_-]/g, '_');
  const b  = d.mbpsReceiveRate != null ? d.mbpsReceiveRate.toFixed(1) : '\u2014';
  const r  = Math.round(d.msRTT ?? 0);
  const dr = d.packetsReceivedDrop ?? 0;
  const lo = d.packetsReceivedLoss ?? 0;
  const eB = document.getElementById('m-b-' + sid);
  const eR = document.getElementById('m-r-' + sid);
  const eD = document.getElementById('m-d-' + sid);
  const eL = document.getElementById('m-l-' + sid);
  if (eB) eB.textContent = b + ' Mbps';
  if (eR) { eR.textContent = r + ' ms'; eR.className = 'metric-value ' + colorRTT(r); }
  if (eD) { eD.textContent = dr; eD.className = 'metric-value ' + colorDrop(dr); }
  if (eL) eL.textContent = lo;
}

async function poll() {
  try {
    const [pR, cR] = await Promise.all([
      fetch(API + '/v3/paths/list'),
      fetch(API + '/v3/srtconns/list')
    ]);
    const paths = (await pR.json()).items ?? [];
    const conns = (await cR.json()).items ?? [];

    const sbp = {};
    for (const c of conns) { if (c.state === 'publish') sbp[c.path] = c; }

    const active = new Set(paths.filter(p => p.ready).map(p => p.name));

    for (const path of active) {
      if (!cards[path]) { cards[path] = { el: null, hls: null }; cards[path].el = createCard(path); }
      updateMetrics(path, sbp[path]);
    }
    for (const path of Object.keys(cards)) {
      if (!active.has(path)) removeCard(path);
    }

    noStr.style.display = active.size === 0 ? 'block' : 'none';
    status.textContent = active.size + ' stream' + (active.size !== 1 ? 's' : '') +
                         ' \u00b7 actualizado ' + new Date().toLocaleTimeString();
  } catch (e) {
    status.textContent = 'error: ' + e.message;
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) { alert(text); }
  document.body.removeChild(ta);
}

// Al volver a la pestaña, forzar todos los players al borde live
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  for (const path of Object.keys(cards)) {
    const c = cards[path];
    const v = c.hls ? c.hls.media : null;
    if (!v) continue;
    if (c.hls) {
      // Reiniciar carga y saltar al borde live
      c.hls.startLoad(-1);
    }
    if (v.seekable && v.seekable.length > 0) {
      v.currentTime = v.seekable.end(v.seekable.length - 1);
    }
    if (v.paused) v.play().catch(() => {});
  }
});

poll();
setInterval(poll, POLL);
</script>
</body>
</html>
