<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SRT Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 20px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    border-bottom: 1px solid #1e2433;
    padding-bottom: 16px;
  }

  header h1 { font-size: 1.2rem; font-weight: 600; color: #fff; }

  #status {
    margin-left: auto;
    font-size: 0.75rem;
    color: #64748b;
  }

  #no-streams {
    text-align: center;
    color: #475569;
    margin-top: 80px;
    font-size: 1rem;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
    gap: 20px;
  }

  .card {
    background: #161b2e;
    border: 1px solid #1e2a45;
    border-radius: 10px;
    overflow: hidden;
    transition: opacity 0.3s;
  }

  .card.fade-in  { animation: fadeIn 0.4s ease; }
  .card.fade-out { opacity: 0; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
  }

  video {
    width: 100%;
    height: 100%;
    display: block;
  }

  .badge-live {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ef4444;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 4px;
  }

  .btn-audio {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 1.1rem;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .btn-audio:hover { background: rgba(0,0,0,0.85); }
  .btn-audio.active { background: #2563eb; border-color: #3b82f6; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: #1e2433;
    border-top: 1px solid #1e2433;
  }

  .metric {
    background: #161b2e;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .metric-label {
    font-size: 0.65rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .metric-value {
    font-size: 1.05rem;
    font-weight: 600;
    color: #e2e8f0;
  }

  .metric-value.green { color: #22c55e; }
  .metric-value.yellow { color: #eab308; }
  .metric-value.red { color: #ef4444; }

  .stream-name {
    padding: 10px 14px 0;
    font-size: 0.8rem;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<header>
  <h1>SRT Monitor</h1>
  <span id="status">conectando...</span>
</header>

<div id="no-streams" style="display:none">Sin streams activos</div>
<div id="grid"></div>

<script>
const HLS_BASE = `http://${location.hostname}:8888`;
const API_BASE = '/api/mediamtx';
const POLL_MS  = 2000;

const cards  = {};  // path → { el, hls, srtId }
const grid   = document.getElementById('grid');
const noStr  = document.getElementById('no-streams');
const status = document.getElementById('status');

function colorRTT(v)  { return v < 50 ? 'green' : v < 150 ? 'yellow' : 'red'; }
function colorDrop(v) { return v === 0 ? 'green' : v < 100 ? 'yellow' : 'red'; }

function muteAll() {
  for (const path of Object.keys(cards)) {
    const video = cards[path].el.querySelector('video');
    const btn   = cards[path].el.querySelector('.btn-audio');
    if (video) video.muted = true;
    if (btn)   { btn.classList.remove('active'); btn.textContent = '🔇'; }
  }
}

function createCard(path) {
  const el = document.createElement('div');
  el.className = 'card fade-in';
  el.innerHTML = `
    <div class="stream-name">${path}</div>
    <div class="video-wrap">
      <video autoplay muted playsinline></video>
      <span class="badge-live">LIVE</span>
      <button class="btn-audio" title="Activar audio">🔇</button>
    </div>
    <div class="metrics">
      <div class="metric">
        <span class="metric-label">Bitrate</span>
        <span class="metric-value" id="m-bitrate-${path}">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">RTT</span>
        <span class="metric-value" id="m-rtt-${path}">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Drops sesión</span>
        <span class="metric-value" id="m-drops-${path}">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Loss detectado</span>
        <span class="metric-value" id="m-loss-${path}">—</span>
      </div>
    </div>
  `;
  grid.appendChild(el);

  const video = el.querySelector('video');
  const btn   = el.querySelector('.btn-audio');
  const src   = `${HLS_BASE}/${path}/index.m3u8`;

  btn.addEventListener('click', () => {
    if (video.muted) {
      muteAll();
      video.muted = false;
      btn.classList.add('active');
      btn.textContent = '🔊';
    } else {
      video.muted = true;
      btn.classList.remove('active');
      btn.textContent = '🔇';
    }
  });

  if (Hls.isSupported()) {
    const hls = new Hls({ lowLatencyMode: true, liveSyncDurationCount: 2 });
    hls.loadSource(src);
    hls.attachMedia(video);
    cards[path].hls = hls;
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src;
  }

  return el;
}

function removeCard(path) {
  const c = cards[path];
  if (!c) return;
  if (c.hls) { c.hls.destroy(); }
  c.el.classList.add('fade-out');
  setTimeout(() => { c.el.remove(); delete cards[path]; }, 350);
}

function updateMetrics(path, srtData) {
  if (!srtData) return;

  const bitrate = srtData.mbpsReceiveRate?.toFixed(1) ?? '—';
  const rtt     = Math.round(srtData.msRTT ?? 0);
  const drops   = srtData.packetsReceivedDrop ?? 0;
  const loss    = srtData.packetsReceivedLoss ?? 0;

  const elB = document.getElementById(`m-bitrate-${path}`);
  const elR = document.getElementById(`m-rtt-${path}`);
  const elD = document.getElementById(`m-drops-${path}`);
  const elL = document.getElementById(`m-loss-${path}`);

  if (elB) { elB.textContent = `${bitrate} Mbps`; }
  if (elR) { elR.textContent = `${rtt} ms`; elR.className = `metric-value ${colorRTT(rtt)}`; }
  if (elD) { elD.textContent = drops; elD.className = `metric-value ${colorDrop(drops)}`; }
  if (elL) { elL.textContent = loss; }
}

async function poll() {
  try {
    const [pathsRes, connsRes] = await Promise.all([
      fetch(`${API_BASE}/v3/paths/list`),
      fetch(`${API_BASE}/v3/srtconns/list`)
    ]);

    const paths = (await pathsRes.json()).items ?? [];
    const conns = (await connsRes.json()).items ?? [];

    // Mapa path → stats SRT
    const srtByPath = {};
    for (const c of conns) {
      if (c.state === 'publish') srtByPath[c.path] = c;
    }

    const activePaths = new Set(
      paths.filter(p => p.ready).map(p => p.name)
    );

    // Agregar nuevos
    for (const path of activePaths) {
      if (!cards[path]) {
        cards[path] = { el: null, hls: null };
        cards[path].el = createCard(path);
      }
      updateMetrics(path, srtByPath[path]);
    }

    // Eliminar los que ya no están
    for (const path of Object.keys(cards)) {
      if (!activePaths.has(path)) removeCard(path);
    }

    noStr.style.display = activePaths.size === 0 ? 'block' : 'none';
    status.textContent = `${activePaths.size} stream${activePaths.size !== 1 ? 's' : ''} · actualizado ${new Date().toLocaleTimeString()}`;

  } catch (e) {
    status.textContent = `error: ${e.message}`;
  }
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
