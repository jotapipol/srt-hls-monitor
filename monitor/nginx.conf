server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy MediaMTX API con CORS
    location /api/mediamtx/ {
        proxy_pass http://host.docker.internal:9997/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    # HLS preview (480p transcodeado)
    location /hls-preview/ {
        alias /data/hls_preview/;
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin *;
        types {
            application/vnd.apple.mpegurl  m3u8;
            video/mp2t                     ts;
        }
    }

    # HLS full quality (proxy a mediamtx, copia fiel)
    location /hls-full/ {
        proxy_pass http://host.docker.internal:8888/;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin *;
    }
}
