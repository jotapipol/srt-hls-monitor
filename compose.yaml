services:

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./conf/mediamtx.yml:/mediamtx.yml
      - ./data/hls:/data/hls
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  transcoder:
    build: ./transcoder
    container_name: srt-transcoder
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/hls_preview:/data/hls_preview
    environment:
      - MEDIAMTX_API=http://localhost:9997
      - HLS_SRC_BASE=http://localhost:8888
      - OUTPUT_DIR=/data/hls_preview
      - POLL_INTERVAL=3
      - PREVIEW_BITRATE=1000k
      - FFMPEG_PRESET=veryfast
      - FFMPEG_THREADS=2
    depends_on:
      - mediamtx

  exporter:
    image: python:3.11-slim
    container_name: mediamtx-exporter
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./exporter:/app
    command: sh -c "pip install -q prometheus_client requests && python /app/exporter.py"
    environment:
      - MEDIAMTX_API=http://localhost:9997
      - EXPORTER_PORT=9999
      - POLL_INTERVAL=1

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/mediamtx.json

  monitor:
    image: nginx:alpine
    container_name: srt-monitor-ui
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MONITOR_PORT:-8900}:80"
    volumes:
      - ./monitor/html:/usr/share/nginx/html:ro
      - ./monitor/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/hls_preview:/data/hls_preview:ro

  speedtest:
    image: openspeedtest/latest
    container_name: openspeedtest
    restart: unless-stopped
    ports:
      - "${SPEEDTEST_PORT:-9800}:3000"
      - "${SPEEDTEST_PORT_SSL:-9801}:3001"

  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    restart: unless-stopped
    pid: host
    network_mode: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NETDATA_CLAIM_TOKEN=${NETDATA_CLAIM_TOKEN:-}
      - NETDATA_CLAIM_URL=https://app.netdata.cloud
      - NETDATA_CLAIM_ROOMS=${NETDATA_CLAIM_ROOMS:-}
    ports:
      - "${NETDATA_PORT:-19999}:19999"

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  netdataconfig:
  netdatalib:
  netdatacache:
